<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ManufactureOS — Costing & Inventory Management</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --bg: #f5f6fa;
  --bg2: #ffffff;
  --bg3: #eef0f6;
  --border: #e2e5ef;
  --border2: #d0d4e4;
  --accent: #f59e0b;
  --accent2: #d97706;
  --accent-light: #fef3c7;
  --red: #ef4444;
  --red-light: #fee2e2;
  --green: #10b981;
  --green-light: #d1fae5;
  --blue: #3b82f6;
  --blue-light: #dbeafe;
  --purple: #8b5cf6;
  --purple-light: #ede9fe;
  --teal: #14b8a6;
  --teal-light: #ccfbf1;
  --text: #1e2233;
  --text2: #6b7280;
  --text3: #9ca3af;
  --card: #ffffff;
  --sidebar-w: 252px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
  --shadow-lg: 0 10px 40px rgba(0,0,0,0.12);
  --radius: 10px;
  --radius-lg: 14px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
code,pre,.mono{font-family:'JetBrains Mono',monospace;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg3);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
.icon-svg{display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;}

/* LOGIN */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#f0f4ff 0%,#fef9f0 50%,#f0fdf4 100%);position:relative;overflow:hidden;}
#login-screen::before{content:'';position:absolute;top:-20%;right:-10%;width:500px;height:500px;background:radial-gradient(circle,rgba(245,158,11,0.08) 0%,transparent 70%);pointer-events:none;}
#login-screen::after{content:'';position:absolute;bottom:-10%;left:-5%;width:400px;height:400px;background:radial-gradient(circle,rgba(59,130,246,0.06) 0%,transparent 70%);pointer-events:none;}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:44px 40px;width:420px;position:relative;z-index:1;box-shadow:var(--shadow-lg);}
.login-logo{text-align:center;margin-bottom:32px;}
.login-logo .logo-wrap{width:60px;height:60px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:16px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:14px;box-shadow:0 4px 14px rgba(245,158,11,0.35);}
.login-logo h1{font-size:22px;font-weight:800;color:var(--text);letter-spacing:-0.5px;}
.login-logo p{color:var(--text2);font-size:13px;margin-top:4px;}
.form-group{margin-bottom:16px;}
.form-group label{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:7px;}
.form-control{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:9px;padding:11px 14px;color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:border-color 0.2s,box-shadow 0.2s;}
.form-control:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(245,158,11,0.12);}
select.form-control option{background:#fff;}
.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 18px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all 0.15s;}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 2px 8px rgba(245,158,11,0.3);}
.btn-primary:hover{box-shadow:0 4px 14px rgba(245,158,11,0.4);transform:translateY(-1px);}
.btn-secondary{background:var(--bg);color:var(--text);border:1.5px solid var(--border);}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light);}
.btn-danger{background:var(--red-light);color:var(--red);border:1.5px solid #fca5a5;}
.btn-danger:hover{background:#fecaca;}
.btn-success{background:var(--green-light);color:var(--green);border:1.5px solid #6ee7b7;}
.btn-success:hover{background:#a7f3d0;}
.btn-blue{background:var(--blue-light);color:var(--blue);border:1.5px solid #93c5fd;}
.btn-blue:hover{background:#bfdbfe;}
.btn-teal{background:var(--teal-light);color:var(--teal);border:1.5px solid #5eead4;}
.btn-teal:hover{background:#99f6e4;}
.btn-sm{padding:6px 12px;font-size:12px;}
.btn-full{width:100%;justify-content:center;padding:13px;}
.demo-logins{margin-top:20px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px;}
.demo-logins h4{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:10px;}
.demo-login-btn{display:flex;align-items:center;gap:8px;width:100%;text-align:left;background:transparent;border:none;padding:6px 4px;color:var(--text2);font-size:12px;font-family:inherit;cursor:pointer;transition:color 0.2s;border-radius:6px;}
.demo-login-btn:hover{color:var(--text);background:var(--border);}
.demo-login-btn span{color:var(--text3);}

/* LAYOUT */
#app{display:none;min-height:100vh;}
.sidebar{position:fixed;top:0;left:0;bottom:0;width:var(--sidebar-w);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100;box-shadow:var(--shadow);}
.sidebar-header{padding:20px 18px 16px;border-bottom:1px solid var(--border);}
.sidebar-logo{display:flex;align-items:center;gap:10px;}
.sidebar-logo .s-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 6px rgba(245,158,11,0.3);}
.sidebar-logo span{font-size:15px;font-weight:800;color:var(--text);letter-spacing:-0.3px;}
.sidebar-user{margin:12px 12px 0;background:linear-gradient(135deg,var(--accent-light),#fff7e6);border:1px solid #fed7aa;border-radius:10px;padding:12px 14px;}
.sidebar-user .user-name{font-size:13px;font-weight:700;color:var(--text);}
.sidebar-user .user-role{font-size:11px;color:var(--accent2);font-weight:600;text-transform:uppercase;letter-spacing:0.8px;margin-top:2px;}
.sidebar-nav{flex:1;padding:12px;overflow-y:auto;}
.nav-section{margin-bottom:18px;}
.nav-section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--text3);padding:0 8px;margin-bottom:4px;}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:8px;cursor:pointer;color:var(--text2);font-size:13px;font-weight:500;transition:all 0.15s;border:1.5px solid transparent;}
.nav-item:hover{background:var(--bg3);color:var(--text);}
.nav-item.active{background:var(--accent-light);color:var(--accent2);border-color:#fde68a;font-weight:600;}
.nav-item .nav-icon{width:20px;height:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sidebar-footer{padding:12px;border-top:1px solid var(--border);}
.main{margin-left:var(--sidebar-w);min-height:100vh;display:flex;flex-direction:column;}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 28px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:var(--shadow);}
.topbar-title{font-size:17px;font-weight:800;color:var(--text);letter-spacing:-0.3px;}
.topbar-right{display:flex;align-items:center;gap:12px;}
.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.badge-admin{background:var(--accent-light);color:var(--accent2);}
.badge-form{background:var(--green-light);color:#059669;}
.badge-view{background:var(--blue-light);color:#2563eb;}
.badge-report{background:var(--purple-light);color:#7c3aed;}
.badge-inventory{background:var(--teal-light);color:#0d9488;}
.page{padding:28px;flex:1;}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:10px;}
.page-title{font-size:22px;font-weight:800;color:var(--text);letter-spacing:-0.5px;}
.page-subtitle{color:var(--text2);font-size:13px;margin-top:3px;}

/* SEARCH BAR */
.search-filter-bar{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
.search-input-wrap{position:relative;flex:1;min-width:200px;}
.search-input-wrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text3);}
.search-input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:9px;padding:9px 14px 9px 36px;color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:border-color 0.2s;}
.search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(245,158,11,0.10);}
.filter-select{background:var(--bg);border:1.5px solid var(--border);border-radius:9px;padding:9px 12px;color:var(--text);font-size:13px;font-family:inherit;outline:none;cursor:pointer;}
.filter-select:focus{border-color:var(--accent);}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;box-shadow:var(--shadow);}
.card-title{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:16px;display:flex;align-items:center;gap:7px;}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:16px;margin-bottom:24px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;box-shadow:var(--shadow);position:relative;overflow:hidden;transition:box-shadow 0.2s,transform 0.2s;}
.stat-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);}
.stat-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:14px;}
.stat-icon.amber{background:var(--accent-light);}
.stat-icon.green{background:var(--green-light);}
.stat-icon.blue{background:var(--blue-light);}
.stat-icon.purple{background:var(--purple-light);}
.stat-icon.red{background:var(--red-light);}
.stat-icon.teal{background:var(--teal-light);}
.stat-label{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.6px;}
.stat-value{font-size:28px;font-weight:800;color:var(--text);margin:4px 0 3px;letter-spacing:-1px;}
.stat-sub{font-size:12px;color:var(--text3);}

/* TABLE */
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.7px;color:var(--text3);padding:10px 14px;text-align:left;border-bottom:1.5px solid var(--border);background:var(--bg3);}
th:first-child{border-radius:8px 0 0 0;}
th:last-child{border-radius:0 8px 0 0;}
td{padding:12px 14px;font-size:13px;color:var(--text2);border-bottom:1px solid var(--border);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--bg3);color:var(--text);}
.td-primary{color:var(--text);font-weight:600;}
.status-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.status-ok{background:var(--green-light);color:#059669;}
.status-low{background:var(--accent-light);color:var(--accent2);}
.status-out{background:var(--red-light);color:var(--red);}

/* MODALS */
.modal-overlay{position:fixed;inset:0;background:rgba(15,20,35,0.45);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:18px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);}
.modal-lg{max-width:800px;}
.modal-header{padding:22px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-size:17px;font-weight:800;color:var(--text);letter-spacing:-0.3px;}
.modal-body{padding:20px 24px;}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;background:var(--bg3);border-radius:0 0 18px 18px;}
.close-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text2);cursor:pointer;font-size:16px;line-height:1;padding:6px 8px;border-radius:7px;transition:all 0.15s;}
.close-btn:hover{background:var(--red-light);color:var(--red);border-color:#fca5a5;}

/* FORM */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.form-group{margin-bottom:14px;}
.form-group label{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.7px;margin-bottom:6px;}
.form-hint{font-size:11px;color:var(--text3);margin-top:4px;}
textarea.form-control{resize:vertical;min-height:80px;}

/* FORMULATION ITEMS */
.fi-row{display:grid;grid-template-columns:1fr 120px 40px;gap:8px;align-items:center;margin-bottom:8px;}
.fi-unit{font-size:11px;font-weight:600;color:var(--text2);padding:11px 10px;background:var(--bg3);border:1.5px solid var(--border);border-radius:7px;white-space:nowrap;text-align:center;}
.add-item-btn{color:var(--accent2);background:var(--accent-light);border:1.5px dashed #fcd34d;border-radius:8px;padding:9px;cursor:pointer;font-size:12px;font-weight:600;width:100%;font-family:inherit;transition:all 0.15s;}
.add-item-btn:hover{background:#fef08a;border-color:var(--accent);}
.remove-btn{background:var(--red-light);border:1px solid #fca5a5;color:var(--red);border-radius:7px;width:34px;height:34px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.remove-btn:hover{background:#fecaca;}

/* ALERTS */
.alert{border-radius:10px;padding:12px 14px;font-size:13px;font-weight:500;margin-bottom:16px;display:flex;align-items:flex-start;gap:9px;}
.alert-warning{background:var(--accent-light);border:1.5px solid #fde68a;color:#92400e;}
.alert-error{background:var(--red-light);border:1.5px solid #fca5a5;color:#991b1b;}
.alert-success{background:var(--green-light);border:1.5px solid #6ee7b7;color:#065f46;}
.alert-info{background:var(--blue-light);border:1.5px solid #93c5fd;color:#1e40af;}

/* TABS */
.tabs{display:flex;gap:4px;background:var(--bg3);border:1.5px solid var(--border);border-radius:11px;padding:4px;margin-bottom:20px;width:fit-content;flex-wrap:wrap;}
.tab{padding:7px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;color:var(--text2);transition:all 0.15s;display:flex;align-items:center;gap:6px;}
.tab.active{background:var(--bg2);color:var(--text);box-shadow:var(--shadow);}
.tab:hover:not(.active){color:var(--text);}

/* STOCK BAR */
.stock-bar{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-top:6px;}
.stock-bar-fill{height:100%;border-radius:3px;transition:width 0.4s;}
.stock-bar-fill.ok{background:var(--green);}
.stock-bar-fill.low{background:var(--accent);}
.stock-bar-fill.out{background:var(--red);}

/* COST TAG */
.cost-tag{font-family:'JetBrains Mono',monospace;font-size:13px;color:#059669;font-weight:500;}

/* TOAST */
#toast-container{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;}
.toast{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 16px;font-size:13px;font-weight:500;min-width:260px;box-shadow:var(--shadow-lg);animation:slideIn 0.3s ease;display:flex;align-items:center;gap:9px;}
.toast.success{border-left:4px solid var(--green);}
.toast.error{border-left:4px solid var(--red);}
.toast.info{border-left:4px solid var(--accent);}
@keyframes slideIn{from{transform:translateX(20px);opacity:0;}to{transform:translateX(0);opacity:1;}}

/* BATCH CARD */
.batch-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:18px;margin-bottom:10px;transition:all 0.2s;box-shadow:var(--shadow);}
.batch-card:hover{border-color:var(--border2);box-shadow:var(--shadow-md);}
.batch-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.batch-card-title{font-weight:700;color:var(--text);font-size:15px;}
.batch-card-code{font-size:12px;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-top:2px;}
.batch-card-meta{display:flex;gap:14px;font-size:12px;color:var(--text3);flex-wrap:wrap;}
.batch-card-meta span{display:flex;align-items:center;gap:4px;}

/* AUDIT */
.audit-row{display:flex;gap:14px;padding:10px 0;border-bottom:1px solid var(--border);}
.audit-row:last-child{border-bottom:none;}
.audit-time{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;white-space:nowrap;padding-top:2px;}
.audit-content{font-size:13px;color:var(--text2);}
.audit-content strong{color:var(--text);}
.audit-tag{color:var(--accent2);font-size:11px;font-weight:600;background:var(--accent-light);padding:1px 7px;border-radius:20px;margin-left:4px;}

/* REPORT SECTION */
.report-section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:22px;margin-bottom:16px;box-shadow:var(--shadow);}
.report-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:22px;box-shadow:var(--shadow);transition:all 0.2s;}
.report-card:hover{box-shadow:var(--shadow-md);border-color:var(--border2);transform:translateY(-2px);}
.report-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:14px;font-size:22px;}

/* KITTING TABLE */
.kitting-shortage{color:var(--red);font-weight:700;}
.kitting-ok{color:var(--green);font-weight:700;}

/* BULK UPLOAD */
.upload-zone{border:2px dashed var(--border2);border-radius:12px;padding:28px;text-align:center;cursor:pointer;transition:all 0.2s;background:var(--bg3);}
.upload-zone:hover{border-color:var(--accent);background:var(--accent-light);}
.upload-zone input{display:none;}

/* SPINNER */
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.6s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-page{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px;gap:14px;color:var(--text2);}

/* GAS SETUP BANNER */
.setup-banner{background:linear-gradient(135deg,#fef3c7,#fde68a);border:1.5px solid #fcd34d;border-radius:12px;padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;gap:14px;}
.setup-banner .sb-icon{font-size:24px;}
.setup-banner h3{font-size:14px;font-weight:700;color:#92400e;}
.setup-banner p{font-size:12px;color:#a16207;margin-top:2px;}

/* LOT MULTIPLIER */
.lot-box{background:linear-gradient(135deg,var(--blue-light),#eff6ff);border:1.5px solid #93c5fd;border-radius:10px;padding:14px 18px;margin-bottom:16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.lot-box label{font-size:13px;font-weight:700;color:#1e40af;white-space:nowrap;}
.lot-input{width:80px;background:#fff;border:1.5px solid #93c5fd;border-radius:8px;padding:8px 10px;font-size:14px;font-weight:700;color:#1e40af;outline:none;text-align:center;}

@media(max-width:768px){
  .sidebar{transform:translateX(-100%);}
  .main{margin-left:0;}
  .form-row,.form-row-3{grid-template-columns:1fr;}
  .stats-grid{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-wrap">

// ════════════════════════════════════════════════════════
//  GAS API HELPER
// ════════════════════════════════════════════════════════
function gasCall(action, payload={}) {
  if (!GAS_URL) return Promise.resolve(null);
  const params = encodeURIComponent(JSON.stringify({action, ...payload}));
  const url = GAS_URL + '?data=' + params;
  return fetch(url, {method:'GET', redirect:'follow'})
    .then(r => r.json())
    .catch(e => { console.error('GAS error:', e); return null; });
}

function showSaving(){const el=document.getElementById('saving-indicator');if(el)el.style.display='flex';}
function hideSaving(){const el=document.getElementById('saving-indicator');if(el)el.style.display='none';}

async function loadFromGAS(){
  if(!GAS_URL) return;
  showSaving();
  try {
    const result = await gasCall('loadAll');
    if(result && result.success && result.data){
      const d = result.data;
      if(d.users && d.users.length) DB.users = d.users;
      if(d.rawMaterials && d.rawMaterials.length) DB.rawMaterials = d.rawMaterials;
      if(d.inventory && d.inventory.length) DB.inventory = d.inventory;
      if(d.formulations) DB.formulations = d.formulations.map(f=>({
        ...f,
        productName: f.productName||'Unnamed',
        productCode: f.productCode||'',
        batchNo: f.batchNo||'',
        mfgDate: f.mfgDate||'',
        byName: f.byName||f.by||'',
        remarks: f.remarks||'',
        lots: Number(f.lots)||1,
        inventoryDebited: f.inventoryDebited===false||f.inventoryDebited==='false'?false:true,
        items: Array.isArray(f.items)?f.items.map(i=>({rmId:Number(i.rmId),qty:Number(i.qty)||0})).filter(i=>i.rmId&&i.qty>0):[],
      }));
      if(d.stockTransactions) DB.stockTransactions = d.stockTransactions;
      if(d.auditLog) DB.auditLog = d.auditLog;
      if(d.packagingCost!==undefined) DB.packagingCost = Number(d.packagingCost)||26;
      if(d.settings) DB.settings = Object.assign({debitInventoryOnSave:true}, d.settings);
      if(d.nextId) DB.nextId = d.nextId;
      toast('Data loaded from Google Sheets ✓','success');
    } else {
      toast('Could not load from Sheets — using local data','info');
    }
  } catch(e){ toast('GAS connection error — using local data','info'); }
  hideSaving();
}

function buildSidebar(){
  const nav=document.getElementById('sidebar-nav');
  nav.innerHTML='';

    const sec=document.createElement('div');sec.className='nav-section';

      const el=document.createElement('div');
      el.className='nav-item';el.id='nav-'+item.id;
      el.innerHTML=`<span class="nav-icon">${NAV_ICONS[item.id]||'●'}</span>${item.label}`;
      el.onclick=()=>navigate(item.id);
      sec.appendChild(el);
    });
    nav.appendChild(sec);
  });
}

  const content=document.getElementById('page-content');

    case 'users':el.innerHTML=can('manageUsers')?renderUsers():'<div class="alert alert-error">Access denied.</div>';break;
    case 'settings':el.innerHTML=can('manageUsers')?renderSettings():'<div class="alert alert-error">Access denied.</div>';break;
    case 'kitting':el.innerHTML=can('kitting')?renderKitting():'<div class="alert alert-error">Access denied.</div>';break;
    default:el.innerHTML='<p>Page not found</p>';
  }
}

//  HELPERS

function getRMById(id){return DB.rawMaterials.find(r=>r.id===id);}
function getInvByRMId(id){return DB.inventory.find(i=>i.rmId===id)||{quantity:0};}
function getStockStatus(rm){
  const inv=getInvByRMId(rm.id);
  if(inv.quantity<=0)return 'out';
  if(inv.quantity<rm.minStock)return 'low';
  return 'ok';
}
function calcBatchCost(f){
  let rmCost=0;
  (f.items||[]).forEach(item=>{const rm=getRMById(item.rmId);if(rm)rmCost+=item.qty*(rm.rate||0);});
  return{rmCost,packaging:DB.packagingCost||0,total:rmCost+(DB.packagingCost||0)};
}
function calcTotalQty(f){return (f.items||[]).reduce((s,i)=>s+(i.qty||0),0);}

function nowDateTime(){
  const now=new Date();
  const pad=n=>String(n).padStart(2,'0');
  return `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`;
}
function nowDate(){return nowDateTime().slice(0,10);}

function toast(msg,type='info'){
  const icons={success:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>',error:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>',info:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>'};
  const t=document.createElement('div');
  t.className='toast '+type;
  t.style.color=type==='success'?'var(--green)':type==='error'?'var(--red)':'var(--accent2)';
  t.innerHTML=(icons[type]||'')+msg;
  document.getElementById('toast-container').appendChild(t);
  setTimeout(()=>t.remove(),3500);
}
function fmtCurrency(n){return '₹'+Number(n).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2});}
function addAudit(action,detail){
  DB.auditLog.unshift({time:nowDateTime(),user:currentUser.name,action,detail});
}

// Search/filter helper
function filterTable(inputId, tableId){
  const q=document.getElementById(inputId)?.value?.toLowerCase()||'';
  const rows=document.querySelectorAll(`#${tableId} tbody tr`);
  rows.forEach(row=>{
    row.style.display=row.textContent.toLowerCase().includes(q)?'':'none';
  });
}

function exportReorderReport(){
  const data=[['Material Name','Code','Unit','Current Stock','Min Required','Shortage','Status']];
  DB.rawMaterials.filter(rm=>getStockStatus(rm)!=='ok').forEach(rm=>{
    const inv=getInvByRMId(rm.id);
    const short=Math.max(0,rm.minStock-inv.quantity);
    data.push([rm.name,rm.code,rm.unit,inv.quantity.toFixed(2),rm.minStock,short.toFixed(2),getStockStatus(rm).toUpperCase()]);
  });
  dlExcel(data,'Reorder_Alert_Report');
}

function filterFormulations(){
  const q=(document.getElementById('form-search')?.value||'').toLowerCase();
  const dateFilter=document.getElementById('form-filter-date')?.value||'';
  const today=nowDate();
  const weekStart=new Date();weekStart.setDate(weekStart.getDate()-7);
  const monthStart=new Date();monthStart.setDate(1);

  document.querySelectorAll('#formulations-list .batch-card').forEach(card=>{
    const name=card.dataset.name||'';
    const code=card.dataset.code||'';
    const batch=card.dataset.batch||'';
    const date=card.dataset.date||'';
    let show=(!q||(name+code+batch).includes(q));
    if(show&&dateFilter){
      const d=new Date(date.slice(0,10));
      if(dateFilter==='today')show=date.startsWith(today);
      else if(dateFilter==='week')show=d>=weekStart;
      else if(dateFilter==='month')show=d>=monthStart;
    }
    card.style.display=show?'':'none';
  });
}

function saveFormulation(){
  const pname=document.getElementById('fm-pname').value.trim();
  const pcode=document.getElementById('fm-pcode').value.trim();
  const batch=document.getElementById('fm-batch').value.trim();
  const mfgDateTime=nowDateTime();
  const remarks=document.getElementById('fm-remarks').value.trim();
  const lots=parseInt(document.getElementById('fm-lots')?.value)||1;
  const debit=DB.settings.debitInventoryOnSave;

  if(!pname){toast('Product Name is required','error');return;}
  if(!batch){toast('Batch Number is required','error');return;}

  const items=[];
  document.querySelectorAll('[id^="fitem-"]').forEach(row=>{
    const id=row.id;
    const rmId=parseInt(document.getElementById('sel-'+id).value);
    const baseQty=parseFloat(document.getElementById('qty-'+id).value);
    if(rmId&&baseQty>0)items.push({rmId,qty:baseQty*lots});
  });
  if(items.length===0){toast('Add at least one raw material','error');return;}

  // Stock check only if debit is ON
  if(debit){
    for(const item of items){
      const inv=getInvByRMId(item.rmId);
      if(inv.quantity<item.qty){
        const rm=getRMById(item.rmId);
        toast(`Insufficient stock for ${rm.name}: need ${item.qty}, have ${inv.quantity.toFixed(2)}`,'error');
        return;
      }
    }
    // Deduct inventory
    items.forEach(item=>{
      const inv=DB.inventory.find(i=>i.rmId===item.rmId);
      if(inv) inv.quantity-=item.qty;
      DB.stockTransactions.push({id:DB.nextId.txn++,rmId:item.rmId,type:'consumption',qty:-item.qty,date:mfgDateTime.slice(0,10),remarks:`Batch ${batch}`,by:currentUser.username});
    });
  }

  const f={id:DB.nextId.formulation++,productName:pname,productCode:pcode,batchNo:batch,mfgDate:mfgDateTime,remarks,by:currentUser.username,byName:currentUser.name,createdAt:mfgDateTime,lots,inventoryDebited:debit,items};
  DB.formulations.push(f);
  const debitNote=debit?' — inventory debited':' — inventory NOT debited (Debit Off)';
  const auditEntry={time:mfgDateTime,user:currentUser.name,action:'Created formulation',detail:`${pcode} — Batch ${batch}${lots>1?' ('+lots+' lots)':''}${debitNote}`};
  DB.auditLog.unshift(auditEntry);

  closeModal('form-modal');
  toast(debit?'Saving to Google Sheets...':'Formulation saved (inventory not debited — Debit Off)','info');

  const invUpdates=debit?items.map(item=>({rmId:item.rmId,newQuantity:getInvByRMId(item.rmId).quantity})):[];
  const txns=debit?DB.stockTransactions.filter(t=>t.remarks===`Batch ${batch}`):[];
  gasCall('saveFormulation',{formulation:f,items,inventoryUpdates:invUpdates,transactions:txns,debitInventory:debit})
    .then(()=>gasCall('addAudit',{entry:auditEntry}))
    .then(()=>toast(debit?'Formulation saved to Google Sheets ✓':'Formulation saved ✓ (no inventory debit)','success'));

  navigate('formulations');
}

function saveCostAnalysis(){
  const name=document.getElementById('ca-name')?.value.trim();
  const productRef=document.getElementById('ca-pref')?.value.trim();
  const batchSize=parseFloat(document.getElementById('ca-bsize')?.value)||0;
  const lots=parseInt(document.getElementById('ca-lots')?.value)||1;
  const notes=document.getElementById('ca-notes')?.value.trim();
  if(!name){toast('Analysis Name is required','error');return;}
  if(!batchSize){toast('Batch size is required','error');return;}
  const items=_getCAItems();
  if(items.length===0){toast('Add at least one material','error');return;}
  let rmCost=0;
  items.forEach(item=>{const rm=getRMById(item.rmId);if(rm)rmCost+=item.qty*lots*rm.rate;});
  const totalCost=rmCost+DB.packagingCost;
  const totalQty=batchSize*lots;
  const rec={
    id:DB.nextId.ca++,
    name,productRef,batchSize,lots,notes,items,
    rmCost,totalCost,costPerKg:totalCost/totalQty,
    savedBy:currentUser.name,savedAt:nowDateTime()
  };
  DB.costAnalysisRecords.push(rec);
  addAudit('Saved cost analysis',`${name} — ${fmtCurrency(totalCost)}`);
  closeModal('ca-modal');
  toast('Cost analysis saved ✓','success');
  navigate('costanalysis');
}

function previewBulkImport(event){
  const file=event.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    const wb=XLSX.read(e.target.result,{type:'array'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const rows=XLSX.utils.sheet_to_json(ws,{header:1});
    if(rows.length<2){document.getElementById('bulk-preview').innerHTML='<div class="alert alert-error">File is empty or invalid.</div>';return;}
    const headers=rows[0].map(h=>String(h).trim());
    const required=['Name','Code','Unit','Rate (₹)','Supplier'];
    const missing=required.filter(r=>!headers.includes(r));
    if(missing.length>0){
      document.getElementById('bulk-preview').innerHTML=`<div class="alert alert-error">Missing columns: ${missing.join(', ')}. Please check your file headers.</div>`;
      return;
    }
    const nameIdx=headers.indexOf('Name'),codeIdx=headers.indexOf('Code'),unitIdx=headers.indexOf('Unit'),rateIdx=headers.indexOf('Rate (₹)'),supplierIdx=headers.indexOf('Supplier');
    window._bulkImportData=[];
    let previewHTML=`<div class="card-title">Preview (${rows.length-1} rows)</div><div class="table-wrap"><table><thead><tr><th>Name</th><th>Code</th><th>Unit</th><th>Rate</th><th>Supplier</th><th>Status</th></tr></thead><tbody>`;
    rows.slice(1).forEach(row=>{
      const name=String(row[nameIdx]||'').trim();
      const code=String(row[codeIdx]||'').trim();
      const unit=String(row[unitIdx]||'KG').trim();
      const rate=parseFloat(row[rateIdx]);
    const rateFinal=isNaN(rate)?0:rate;
      const supplier=String(row[supplierIdx]||'').trim();
      if(!name||!code){previewHTML+=`<tr><td colspan="6" style="color:var(--red);">Skipping invalid row</td></tr>`;return;}
      const exists=DB.rawMaterials.find(r=>r.code===code);
      const status=exists?'<span class="status-pill status-low">UPDATE</span>':'<span class="status-pill status-ok">NEW</span>';
      window._bulkImportData.push({name,code,unit,rate:rateFinal,supplier});
      previewHTML+=`<tr><td class="td-primary">${name}</td><td class="mono" style="font-size:11px;">${code}</td><td>${unit}</td><td class="cost-tag">${fmtCurrency(rateFinal)}</td><td>${supplier}</td><td>${status}</td></tr>`;
    });
    previewHTML+=`</tbody></table></div>`;
    document.getElementById('bulk-preview').innerHTML=previewHTML;
    document.getElementById('bulk-import-btn').style.display='flex';
  };
  reader.readAsArrayBuffer(file);
}

async function confirmBulkImport(){
  if(!window._bulkImportData.length){toast('No data to import','error');return;}

  const btn=document.getElementById('bulk-import-btn');
  if(btn){btn.disabled=true;btn.innerHTML='<div class="spinner" style="width:14px;height:14px;border-color:#fff3;border-top-color:#fff"></div> Saving...';}

  let added=0, updated=0;
  const toSave=[];

  window._bulkImportData.forEach(item=>{
    const exists=DB.rawMaterials.find(r=>r.code===item.code);
    if(exists){
      Object.assign(exists,{name:item.name,unit:item.unit,rate:item.rate,supplier:item.supplier,updatedDate:nowDate()});
      toSave.push({rm:exists, isNew:false});
      updated++;
    } else {
      const newRM={id:DB.nextId.rm++,name:item.name,code:item.code,unit:item.unit,rate:item.rate,supplier:item.supplier,updatedDate:nowDate(),minStock:0};
      DB.rawMaterials.push(newRM);
      DB.inventory.push({id:DB.nextId.rm,rmId:newRM.id,quantity:0});
      DB.nextId.rm++;
      toSave.push({rm:newRM, isNew:true});
      added++;
    }
  });

  addAudit('Bulk import raw materials',`${added} added, ${updated} updated`);
  closeModal('bulk-modal');
  toast(`Saving ${toSave.length} materials to Google Sheets...`,'info');

  let saved=0, failed=0;
  for(const entry of toSave){
    try{
      const result = await gasCall('saveRawMaterial',{rm:entry.rm, isNew:entry.isNew});
      if(result && result.success) saved++;
      else failed++;
    } catch(e){ failed++; }
  }

  await gasCall('addAudit',{entry:DB.auditLog[0]});

  if(failed===0){
    toast(`All ${saved} materials saved to Google Sheets`,'success');
  } else {
    toast(`${saved} saved, ${failed} failed — check GAS connection`,'error');
  }

  navigate('rawmaterials');
}

function deleteRM(id){
  const rm=getRMById(id);
  if(!rm)return;
  if(!confirm(`Delete "${rm.name}"? This cannot be undone.`))return;
  const inUse=DB.formulations.some(f=>f.items.some(i=>i.rmId===id));

  DB.rawMaterials.splice(DB.rawMaterials.findIndex(r=>r.id===id),1);
  DB.inventory=DB.inventory.filter(i=>i.rmId!==id);
  addAudit('Deleted raw material',rm.code+' — '+rm.name);
  toast('Material deleted','info');
  navigate('rawmaterials');
}

function saveRM(id){
  const name=document.getElementById('rm-name').value.trim();
  const code=document.getElementById('rm-code').value.trim();
  const unit=document.getElementById('rm-unit').value;
  const rateEl=document.getElementById('rm-rate');
  const rate=currentUser.role==='inventory'?(getRMById(id)?.rate||0):(parseFloat(rateEl.value)||0);
  const supplierEl=document.getElementById('rm-supplier');
  const supplier=supplierEl?supplierEl.value.trim():(getRMById(id)?.supplier||'');
  const updatedDate=document.getElementById('rm-updated').value;
  const minStockEl=document.getElementById('rm-minstock');
  const minStock=minStockEl?(isNaN(parseInt(minStockEl.value,10))?0:parseInt(minStockEl.value,10)):(getRMById(id)?.minStock||0);
  if(!name||!code){toast('Name and Code are required','error');return;}
  // rate can be 0 (allowed) — only block if field is completely empty/NaN
  if(currentUser.role!=='inventory'&&isNaN(parseFloat(rateEl?.value))){toast('Rate is required — enter 0 if free','error');return;}
  if(id){
    const rm=DB.rawMaterials.find(r=>r.id===id);
    const oldName=rm.name;
    // Update DB in memory
    rm.name=name; rm.code=code; rm.unit=unit; rm.rate=rate;
    rm.supplier=supplier; rm.updatedDate=updatedDate; rm.minStock=minStock;
    // Build a clean explicit object for GAS — no extra props, exact field order
    const rmForGAS={id:rm.id,name:name,code:code,unit:unit,rate:rate,supplier:supplier,updatedDate:updatedDate,minStock:minStock};
    const detail=`${code} — ${name}${oldName!==name?' (renamed from '+oldName+')':''}`;
    addAudit('Updated raw material',detail);
    toast('Saving...','info');
    gasCall('saveRawMaterial',{rm:rmForGAS,isNew:false})
      .then(()=>gasCall('addAudit',{entry:DB.auditLog[0]}))
      .then(()=>toast('Material updated ✓','success'));
  } else {
    const newRM={id:DB.nextId.rm++,name:name,code:code,unit:unit,rate:rate,supplier:supplier,updatedDate:updatedDate,minStock:minStock};
    DB.rawMaterials.push(newRM);
    DB.inventory.push({id:DB.nextId.rm,rmId:newRM.id,quantity:0});
    DB.nextId.rm++;
    addAudit('Added raw material',`${code} — ${name}`);
    toast('Saving...','info');
    gasCall('saveRawMaterial',{rm:newRM,isNew:true})
      .then(()=>gasCall('addAudit',{entry:DB.auditLog[0]}))
      .then(()=>toast('Material saved ✓','success'));
  }
  closeModal('rm-modal');
  navigate('rawmaterials');
}

function saveStock(){
  const rmId=parseInt(document.getElementById('st-rm').value);
  const qty=parseFloat(document.getElementById('st-qty').value);
  const date=document.getElementById('st-date').value;
  const remarks=document.getElementById('st-remarks').value.trim();
  if(!qty||qty<=0){toast('Enter valid quantity','error');return;}
  const inv=DB.inventory.find(i=>i.rmId===rmId);
  if(inv)inv.quantity+=qty;
  const rm=getRMById(rmId);
  if(rm)rm.updatedDate=date;
  const tx={id:DB.nextId.txn++,rmId,type:'purchase',qty,date,remarks,by:currentUser.username};
  DB.stockTransactions.push(tx);
  addAudit('Stock added',`${getRMById(rmId)?.name} +${qty}`);
  closeModal('stock-modal');
  toast('Saving...','info');
  gasCall('addTransaction',{transaction:tx})
    .then(()=>gasCall('updateInventory',{rmId,newQuantity:inv.quantity}))
    .then(()=>gasCall('addAudit',{entry:DB.auditLog[0]}))
    .then(()=>toast('Stock saved ✓','success'));
  navigate('inventory');
}

function saveAdjustment(){
  const rmId=parseInt(document.getElementById('adj-rm').value);
  const type=document.getElementById('adj-type').value;
  const date=document.getElementById('adj-date').value;
  const remarks=document.getElementById('adj-remarks').value.trim();
  const isInvUser=currentUser.role==='inventory';
  let qty=parseFloat(document.getElementById('adj-qty').value);
  if(isNaN(qty)){toast('Enter valid quantity','error');return;}
  // Inventory user always inputs positive; subtract types auto-negate
  if(isInvUser&&(type==='damage'||type==='adjustment')) qty=-Math.abs(qty);
  const inv=DB.inventory.find(i=>i.rmId===rmId);
  if(inv){inv.quantity+=qty;if(inv.quantity<0)inv.quantity=0;}
  const tx={id:DB.nextId.txn++,rmId,type,qty,date,remarks,by:currentUser.username};
  DB.stockTransactions.push(tx);
  addAudit(`Stock ${type}`,`${getRMById(rmId)?.name} ${qty>0?'+':''}${qty}`);
  toast('Saving...','info');
  gasCall('addTransaction',{transaction:tx})
    .then(()=>gasCall('updateInventory',{rmId,newQuantity:inv.quantity}))
    .then(()=>gasCall('addAudit',{entry:DB.auditLog[0]}))
    .then(()=>toast('Adjustment saved ✓','success'));
  navigate('inventory');
}

          <button class="btn btn-secondary btn-sm" onclick="viewKittingRecord(${rec.id})">View</button>

          <button class="btn btn-danger btn-sm" onclick="deleteKittingRecord(${rec.id})">Del</button>
        </td>
      </tr>`;
    });
    html+=`</tbody></table></div>`;
  }
  html+=`</div>`;

  // Quick analysis panel (inline, not saved)
  html+=`<div class="card">
    <div class="card-title">⚡ Quick Kitting Check (not saved)</div>
    <div class="form-row">
      <div class="form-group"><label>Finished Product</label>

      <div class="form-group"><label>Number of Lots</label>
        <input class="form-control" id="kit-lots" type="number" min="1" value="1" oninput="runQuickKitting()">
      </div>
    </div>
    <div id="kitting-result"></div>
  </div>`;

  return html;
}

function filterKitDB(){
  const q=(document.getElementById('kit-db-search')?.value||'').toLowerCase();
  const status=document.getElementById('kit-db-status')?.value||'';
  document.querySelectorAll('#kit-db-table tbody tr').forEach(row=>{
    const matchQ=!q||row.textContent.toLowerCase().includes(q);
    const matchS=!status||row.dataset.status===status;
    row.style.display=(matchQ&&matchS)?'':'none';
  });
}

function runQuickKitting(){
  const fId=parseInt(document.getElementById('kit-form')?.value);
  const lots=parseInt(document.getElementById('kit-lots')?.value)||1;
  const f=DB.formulations.find(x=>x.id===fId);
  if(!f){document.getElementById('kitting-result').innerHTML='';return;}
  const {rows,allOk}=_buildKittingRows(f,lots);
  document.getElementById('kitting-result').innerHTML=`
    <div style="margin-top:14px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px;">
        <div style="font-size:13px;font-weight:700;color:var(--text);">Result: ${f.productName} × ${lots} lot(s)</div>
        <div style="display:flex;gap:8px;">
          ${allOk?`<span class="status-pill status-ok">✓ All Materials Available</span>`:`<span class="status-pill status-out">⚠ Shortages Found</span>`}
          <button class="btn btn-success btn-sm" onclick="exportQuickKitting()">↓ Export</button>
          <button class="btn btn-primary btn-sm" onclick="saveQuickKittingAsRecord()">💾 Save This Analysis</button>
        </div>
      </div>
      <div class="table-wrap"><table id="quick-kit-table">
        <thead><tr><th>Finished Product</th><th>Raw Material</th><th>Required Qty</th><th>Unit</th><th>Available</th><th>To Order</th><th>Final Purchase Qty</th><th>Status</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
    </div>`;
}

function _buildKittingRows(f,lots){
  let rows='';let allOk=true;
  f.items.forEach(item=>{
    const rm=getRMById(item.rmId);if(!rm)return;
    const required=item.qty*lots;
    const available=getInvByRMId(rm.id).quantity;
    const toOrder=Math.max(0,required-available);
    if(toOrder>0) allOk=false;
    const statusPill=toOrder>0?`<span class="status-pill status-out">Shortage</span>`:`<span class="status-pill status-ok">OK</span>`;
    rows+=`<tr>
      <td class="td-primary">${f.productName}</td>
      <td class="td-primary">${rm.name}</td>
      <td style="font-weight:600;">${required.toFixed(3)}</td>
      <td>${rm.unit}</td>
      <td>${available.toFixed(3)}</td>
      <td class="${toOrder>0?'kitting-shortage':'kitting-ok'}" style="font-weight:700;">${toOrder>0?toOrder.toFixed(3):'✓ 0'}</td>
      <td style="font-weight:700;color:${toOrder>0?'var(--red)':'var(--green)'};">${toOrder>0?toOrder.toFixed(3)+' '+rm.unit:'—'}</td>
      <td>${statusPill}</td>
    </tr>`;
  });
  return{rows,allOk};
}

function saveKittingAnalysis(){
  const name=document.getElementById('kn-name')?.value.trim();
  const orderRef=document.getElementById('kn-ref')?.value.trim();
  const fId=parseInt(document.getElementById('kn-form')?.value);
  const lots=parseInt(document.getElementById('kn-lots')?.value)||1;
  const notes=document.getElementById('kn-notes')?.value.trim();
  if(!name){toast('Analysis name is required','error');return;}
  const f=DB.formulations.find(x=>x.id===fId);
  if(!f){toast('Select a product','error');return;}

  let shortageCount=0;let totalRequired=0;
  const lineItems=f.items.map(item=>{
    const rm=getRMById(item.rmId);if(!rm)return null;
    const required=item.qty*lots;
    const available=getInvByRMId(rm.id).quantity;
    const toOrder=Math.max(0,required-available);
    if(toOrder>0) shortageCount++;
    totalRequired+=required;
    return{rmId:item.rmId,rmName:rm.name,rmCode:rm.code,unit:rm.unit,required,available,toOrder,finalPurchase:toOrder>0?toOrder:0};
  }).filter(Boolean);

  const rec={
    id:DB.nextId.kit++,
    name,orderRef,formId:fId,productName:f.productName,productCode:f.productCode,
    lots,notes,lineItems,shortageCount,totalRequired,
    hasShortage:shortageCount>0,
    savedBy:currentUser.name,savedAt:nowDateTime()
  };
  DB.kittingRecords.push(rec);
  addAudit('Saved kitting analysis',`${name} — ${f.productName} × ${lots} lots`);
  closeModal('kit-modal');
  toast(`Kitting analysis saved ✓ (${shortageCount} shortage(s))`,'success');
  navigate('kitting');
}

  navigate('kitting');
}

function exportQuickKitting(){
  const fId=parseInt(document.getElementById('kit-form')?.value);
  const lots=parseInt(document.getElementById('kit-lots')?.value)||1;
  const f=DB.formulations.find(x=>x.id===fId);if(!f)return;
  const data=[['Finished Product','Raw Material','Code','Required Qty','Unit','Available Qty','Qty to Order','Final Purchase Qty','Status']];
  f.items.forEach(item=>{
    const rm=getRMById(item.rmId);if(!rm)return;
    const req=item.qty*lots;
    const avail=getInvByRMId(rm.id).quantity;
    const toOrder=Math.max(0,req-avail);
    data.push([f.productName,rm.name,rm.code,req.toFixed(3),rm.unit,avail.toFixed(3),toOrder.toFixed(3),toOrder>0?toOrder.toFixed(3)+' '+rm.unit:'—',toOrder>0?'Shortage':'OK']);
  });
  dlExcel(data,`QuickKitting_${f.productCode}_${lots}lots`);
}

function saveQuickKittingAsRecord(){
  const fId=parseInt(document.getElementById('kit-form')?.value);
  const lots=parseInt(document.getElementById('kit-lots')?.value)||1;
  const f=DB.formulations.find(x=>x.id===fId);if(!f)return;
  // Pre-fill and open the save modal
  window._kitQuickFId=fId;
  window._kitQuickLots=lots;
  openNewKitting();
  // Set values after modal renders
  setTimeout(()=>{
    const sel=document.getElementById('kn-form');
    if(sel){sel.value=fId;previewKittingModal();}
    const lotsEl=document.getElementById('kn-lots');
    if(lotsEl){lotsEl.value=lots;previewKittingModal();}
  },50);
}

function exportSingleKittingRecord(id){
  const rec=DB.kittingRecords.find(r=>r.id===id);if(!rec)return;
  const data=[['Analysis Name','Order Ref','Product','Lots','Saved By','Date','','','','','']];
  data.push([rec.name,rec.orderRef||'',rec.productName,rec.lots,rec.savedBy,rec.savedAt,'','','','','']);
  data.push(['','','','','','','','','','','']);
  data.push(['Finished Product','Raw Material','Code','Required Qty','Unit','Available Qty','Qty to Order','Final Purchase Qty','Status']);
  rec.lineItems.forEach(li=>{
    data.push([rec.productName,li.rmName,li.rmCode,li.required.toFixed(3),li.unit,li.available.toFixed(3),li.toOrder.toFixed(3),li.finalPurchase>0?li.finalPurchase.toFixed(3)+' '+li.unit:'—',li.toOrder>0?'SHORTAGE':'OK']);
  });
  dlExcel(data,`Kitting_${rec.name.replace(/\s+/g,'_')}`);
}

function exportAllKittingRecords(){
  const data=[['Analysis Name','Order Ref','Product','Lots','Total Required KG','Shortages','Status','Saved By','Date']];
  DB.kittingRecords.forEach(rec=>{
    data.push([rec.name,rec.orderRef||'',rec.productName,rec.lots,rec.totalRequired.toFixed(2),rec.shortageCount,rec.hasShortage?'SHORTAGE':'ALL OK',rec.savedBy,rec.savedAt]);

function openUserModal(id){
  const u=id?DB.users.find(x=>x.id===id):{};
  const modal=`<div class="modal-overlay" id="user-modal" onclick="if(event.target.id==='user-modal')closeModal('user-modal')">
  <div class="modal">
    <div class="modal-header"><div class="modal-title">${id?'Edit':'Add'} User</div><button class="close-btn" onclick="closeModal('user-modal')">✕</button></div>
    <div class="modal-body">
      <div class="form-group"><label>Full Name</label><input class="form-control" id="usr-name" value="${u.name||''}" placeholder="Full name"></div>
      <div class="form-group"><label>Username</label><input class="form-control" id="usr-uname" value="${u.username||''}" placeholder="login username"></div>
      <div class="form-group"><label>Password</label><input class="form-control" id="usr-pass" type="password" placeholder="${id?'Leave blank to keep current':'Set password'}"></div>
      <div class="form-group"><label>Role</label>
        <select class="form-control" id="usr-role">
          <option value="admin" ${u.role==='admin'?'selected':''}>👑 Administrator</option>
          <option value="formulation" ${u.role==='formulation'?'selected':''}>🔬 Formulation User</option>
          <option value="inventory" ${u.role==='inventory'?'selected':''}>📦 Inventory User</option>
          <option value="view" ${u.role==='view'?'selected':''}>👁 View Only</option>
          <option value="report" ${u.role==='report'?'selected':''}>📊 Report User</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('user-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveUser(${id||0})">Save</button>
    </div>
  </div></div>`;
  document.body.insertAdjacentHTML('beforeend',modal);
}

function saveUser(id){
  const name=document.getElementById('usr-name').value.trim();
  const username=document.getElementById('usr-uname').value.trim();
  const pass=document.getElementById('usr-pass').value;
  const role=document.getElementById('usr-role').value;
  if(!name||!username){toast('Fill required fields','error');return;}
  if(id){
    const u=DB.users.find(x=>x.id===id);
    u.name=name;u.username=username;u.role=role;
    if(pass)u.password=pass;
    addAudit('Updated user',`${username} — ${role}`);
    toast('Saving...','info');
    gasCall('saveUser',{user:u,isNew:false})
      .then(()=>gasCall('addAudit',{entry:DB.auditLog[0]}))
      .then(()=>toast('User updated ✓','success'));
  }else{
    if(!pass){toast('Password required','error');return;}
    const newUser={id:DB.nextId.user++,username,password:pass,name,role};
    DB.users.push(newUser);
    addAudit('Created user',`${username} — ${role}`);
    toast('Saving...','info');
    gasCall('saveUser',{user:newUser,isNew:true})
      .then(()=>gasCall('addAudit',{entry:DB.auditLog[0]}))
      .then(()=>toast('User saved ✓','success'));
  }
  closeModal('user-modal');
  navigate('users');
}

function deleteUser(id){
  if(id===currentUser.id){toast('Cannot delete yourself','error');return;}
  if(!confirm('Delete this user?'))return;
  DB.users.splice(DB.users.findIndex(u=>u.id===id),1);
  toast('User deleted','info');
  navigate('users');
}

function exportInventoryExcel(){
  const headers=['Material Name','Code','Unit','Available Qty','Min Stock','Status','Last Updated'];
  if(can('viewPrice'))headers.push('Rate (₹)','Stock Value (₹)');
  const data=[headers];
  DB.rawMaterials.forEach(rm=>{
    const inv=getInvByRMId(rm.id);
    const row=[rm.name,rm.code,rm.unit,inv.quantity,rm.minStock,getStockStatus(rm).toUpperCase(),rm.updatedDate];
    if(can('viewPrice'))row.push(rm.rate,(inv.quantity*rm.rate).toFixed(2));
    data.push(row);
  });
  if(can('viewPrice')){
    const totalVal=DB.rawMaterials.reduce((s,rm)=>s+(getInvByRMId(rm.id).quantity*rm.rate),0);
    data.push(['','','','','','','TOTAL','',totalVal.toFixed(2)]);
  }
  dlExcel(data,'Inventory_Report');
}
function exportBatchExcel(){
  const data=[['Product Name','Product Code','Batch No','Mfg Date & Time','Lots','Total Qty (KG)','Created By','Created At']];
  DB.formulations.forEach(f=>data.push([f.productName,f.productCode,f.batchNo,f.mfgDate,f.lots||1,calcTotalQty(f).toFixed(2),f.byName,f.createdAt]));
  dlExcel(data,'Batch_History');
}
function exportConsumptionExcel(){
  const data=[['Date','Material','Code','Type','Qty','Remarks','By']];
  DB.stockTransactions.forEach(tx=>{
    const rm=getRMById(tx.rmId);
    data.push([tx.date,rm?rm.name:'Unknown',rm?rm.code:'',tx.type,tx.qty,tx.remarks||'',tx.by]);
  });
  dlExcel(data,'Consumption_Report');
}
function exportCostingExcel(){
  if(!can('viewCost')){toast('Access denied','error');return;}
  const data=[['Batch No','Product Name','Product Code','Lots','RM Cost (₹)','Packaging (₹)','Total Cost (₹)','Cost/KG (₹)','Mfg Date','Created By']];
  DB.formulations.forEach(f=>{
    const c=calcBatchCost(f);const q=calcTotalQty(f);
    data.push([f.batchNo,f.productName,f.productCode,f.lots||1,c.rmCost.toFixed(2),c.packaging.toFixed(2),c.total.toFixed(2),(c.total/q).toFixed(2),f.mfgDate,f.byName]);
  });
  dlExcel(data,'Costing_Report');
}
function exportFormulationExcel(id){
  const f=DB.formulations.find(x=>x.id===id);if(!f)return;
  const data=[['Material','Code','Unit','Qty Used (per lot)','Total Qty Used']];
  f.items.forEach(item=>{const rm=getRMById(item.rmId);if(rm)data.push([rm.name,rm.code,rm.unit,item.qty/(f.lots||1),item.qty]);});
  if(can('viewCost')){
    const cost=calcBatchCost(f);
    data.push(['','','','','']);
    data.push(['RM Cost','','','',cost.rmCost]);
    data.push(['Packaging','','','',cost.packaging]);
    data.push(['TOTAL','','','',cost.total]);
  }
  dlExcel(data,`Formulation_${f.batchNo}`);
}
function dlExcel(data,name){
  const ws=XLSX.utils.aoa_to_sheet(data);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Report');
  XLSX.writeFile(wb,name+'_'+new Date().toISOString().slice(0,10)+'.xlsx');
  toast('Excel file downloaded','success');
}

    <thead><tr><th class="c">S.No</th><th>Raw Material Name</th><th class="c">Code</th><th class="c">Unit</th><th class="r">Qty Used</th>${showCost?'<th class="r">Rate/Unit</th><th class="r">Amount (&#8377;)</th>':''}</tr></thead>
    <tbody>${itemRows}</tbody>
    <tfoot><tr style="background:#f0f0f0"><td class="c" colspan="4" style="font-weight:700;text-align:right;padding-right:10px;">TOTAL →</td><td class="r" style="font-weight:700;font-size:11pt;font-family:'JetBrains Mono'">${totalQty.toFixed(3)}</td>${showCost?`<td></td><td class="r" style="font-weight:700;font-size:10.5pt;font-family:'JetBrains Mono'">&#8377;${cost.rmCost.toLocaleString('en-IN',{minimumFractionDigits:2})}</td>`:''}</tr></tfoot>
  </table>
  ${showCost?`<div class="tr-row"><table><tr><td>Raw Material Cost</td><td>&#8377;${cost.rmCost.toLocaleString('en-IN',{minimumFractionDigits:2})}</td></tr><tr><td>Packaging Cost</td><td>&#8377;${cost.packaging.toLocaleString('en-IN',{minimumFractionDigits:2})}</td></tr><tr class="gd"><td>TOTAL BATCH COST</td><td>&#8377;${cost.total.toLocaleString('en-IN',{minimumFractionDigits:2})}</td></tr><tr><td style="color:#666">Cost Per KG</td><td style="color:#444">&#8377;${(cost.total/totalQty).toLocaleString('en-IN',{minimumFractionDigits:2})}</td></tr></table></div>`:''}
  <div class="rem"><div class="rl">Remarks</div><div>${f.remarks||'<span style="color:#bbb;font-style:italic">No remarks recorded.</span>'}</div></div>
  <div class="sig">
    <div><div class="sl"><div class="st">Prepared By</div><div style="font-size:9pt;color:#444;margin-top:2px">${f.byName}</div></div></div>
    <div><div class="sl"><div class="st">Quality Check</div></div></div>
    <div><div class="sl"><div class="st">Authorised By</div></div></div>
  </div>
  <div class="df"><span>ManufactureOS</span><span>Batch: ${f.batchNo} | Product: ${f.productCode}</span><span>Printed: ${printDate}</span></div>
</div></body></html>`;

  const blob=new Blob([html],{type:'text/html'});
  const url=URL.createObjectURL(blob);
  const old=document.getElementById('pdf-overlay');if(old)old.remove();
  const overlay=document.createElement('div');
  overlay.id='pdf-overlay';
  overlay.style.cssText='position:fixed;inset:0;background:#1a1a1a;z-index:9999;display:flex;flex-direction:column;';
  const toolbar=document.createElement('div');
  toolbar.style.cssText='background:#111827;padding:12px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #374151;flex-shrink:0;';
  toolbar.innerHTML=`
    <span style="color:#f59e0b;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:700;">📄 ${f.productName} — Batch ${f.batchNo}</span>
    <span style="flex:1"></span>
    <button onclick="document.getElementById('pdf-print-frame').contentWindow.print()" style="background:linear-gradient(135deg,#f59e0b,#d97706);color:#000;border:none;padding:9px 22px;font-size:13px;font-family:'Plus Jakarta Sans',sans-serif;cursor:pointer;border-radius:8px;font-weight:700;">🖨 Print / Save as PDF</button>
    <a href="${url}" download="BatchRecord_${f.batchNo}.html" style="background:#3b82f6;color:#fff;border:none;padding:9px 22px;font-size:13px;font-family:'Plus Jakarta Sans',sans-serif;cursor:pointer;border-radius:8px;font-weight:700;text-decoration:none;">↓ Download</a>
    <button onclick="document.getElementById('pdf-overlay').remove();URL.revokeObjectURL('${url}')" style="background:#374151;color:#fff;border:1px solid #4b5563;padding:9px 16px;font-size:13px;cursor:pointer;border-radius:8px;">✕ Close</button>`;
  const iframe=document.createElement('iframe');
  iframe.id='pdf-print-frame';iframe.src=url;
  iframe.style.cssText='flex:1;border:none;background:#fff;';
  overlay.appendChild(toolbar);overlay.appendChild(iframe);
  document.body.appendChild(overlay);
  addAudit('Exported PDF',`${f.productCode} — Batch ${f.batchNo}`);
  toast('PDF ready — use Print / Save as PDF button','success');
}

function exportAllBatchPDFs(){
  const myForms=currentUser.role==='formulation'?DB.formulations.filter(f=>f.by===currentUser.username):DB.formulations;
  if(myForms.length===0){toast('No formulations found','error');return;}
  const opts=myForms.map(f=>`<option value="${f.id}">${f.batchNo} — ${f.productName} (${f.mfgDate})</option>`).join('');
  const m=`<div class="modal-overlay" id="allpdf-modal" onclick="if(event.target.id==='allpdf-modal')closeModal('allpdf-modal')">
  <div class="modal">
    <div class="modal-header"><div class="modal-title">Select Batch for PDF</div><button class="close-btn" onclick="closeModal('allpdf-modal')">✕</button></div>
    <div class="modal-body"><div class="form-group"><label>Select Batch</label><select class="form-control" id="allpdf-sel">${opts}</select></div></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('allpdf-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="closeModal('allpdf-modal');exportFormulationPDF(parseInt(document.getElementById('allpdf-sel').value))">Export PDF</button>
    </div>
  </div></div>`;
  document.body.insertAdjacentHTML('beforeend',m);
}

// ════════════════════════════════════════════════════════
//  MODAL UTIL
// ════════════════════════════════════════════════════════
function closeModal(id){document.getElementById(id)?.remove();formItemCount=0;caItemCount=0;}
</script>
